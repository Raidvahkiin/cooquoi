name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

env:
  # Disable Nx sync generators check to prevent interactive prompts in CI
  NX_SYNC_GENERATORS_CHECK: false

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bunx nx run-many -t lint --parallel=3

      - name: Typecheck
        run: bunx nx run-many -t typecheck --parallel=3

      - name: Test
        run: bunx nx run-many -t test --parallel=3
